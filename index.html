<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Base Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top-left nav -->
    <nav class="top-nav">
        <a href="https://flegmon2001.github.io/MainFleg-Web">Fleg-Web</a>
    </nav>
    
    <div class="container">
        <h1>Base Converter</h1>

        <label>Number:</label>
        <input type="text" id="number">

        <label>Base of number:</label>
        <input type="number" id="baseFrom" min="1" max="36">

        <label>Base to convert to:</label>
        <input type="number" id="baseTo" min="1" max="36">

        <label>Converted number:</label>
        <input type="text" id="result" readonly>

        <div class="buttons">
            <button onclick="convert()">Convert</button>
            <button onclick="swapBases()">Swap</button>
            <button onclick="clearFields()">Clear</button>
        </div>

        <h2>Logs</h2>
        <div id="logBox"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
